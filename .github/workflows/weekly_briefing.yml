name: 주간 크리에이티브 인사이트 브리핑

on:
  schedule:
    - cron: '0 0 * * 1'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  briefing:
    runs-on: ubuntu-latest

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: Python 세팅
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 패키지 설치
        run: |
          pip install -r requirements.txt
          python -m playwright install --with-deps chromium

      - name: 브리핑 봇 실행
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: python creative_briefing_bot.py

      - name: 아카이브 커밋 & 푸시
        run: |
          git config user.name "briefing-bot"
          git config user.email "briefing-bot@users.noreply.github.com"
          git add web/data
          if git diff --cached --quiet; then
            echo "변경 없음 — skip"
            exit 0
          fi
          git commit -m "chore: archive $(date -u +%F) briefing"
          # 실행 중(수 분) 사이에 다른 커밋이 들어오면 push가 거부된다 → rebase 후 재시도
          for attempt in 1 2 3; do
            if git push; then
              exit 0
            fi
            echo "push 거부됨 — rebase 후 재시도 ($attempt/3)"
            git pull --rebase
          done
          echo "3회 시도 후에도 push 실패"
          exit 1
