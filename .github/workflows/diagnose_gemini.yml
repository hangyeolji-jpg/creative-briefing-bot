name: (임시) Gemini 키 진단

on:
  workflow_dispatch:

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - run: pip install "google-genai>=1.0"

      - name: 사용 가능 모델 확인 + 실제 호출 테스트
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          python - <<'PY'
          import os
          from google import genai

          client = genai.Client(api_key=os.environ["GEMINI_API_KEY"])

          print("=== 이 키로 보이는 모델 (generateContent 지원) ===")
          names = []
          for m in client.models.list():
              actions = getattr(m, "supported_actions", None) or []
              if not actions or "generateContent" in actions:
                  names.append(m.name)
                  print(" ", m.name)

          print("\n=== 실제 호출 테스트 (무료 할당량 있는 모델 찾기) ===")
          candidates = [n.replace("models/", "") for n in names]
          # flash-lite / flash 계열을 먼저 시도 (무료 티어 가능성 높은 순)
          candidates.sort(key=lambda n: (("lite" not in n), ("flash" not in n), n))

          for name in candidates[:12]:
              try:
                  r = client.models.generate_content(model=name, contents="ping")
                  ok = (r.text or "").strip()[:20]
                  print(f"  ✅ {name} → {ok!r}")
              except Exception as e:
                  msg = str(e).split("{")[0].strip()[:70]
                  print(f"  ❌ {name} → {msg}")
          PY
